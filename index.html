<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Principal - Gestión Hospitalaria</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Iconos de Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Estilos Propios -->
    <link rel="stylesheet" href="Estilos/Paleta.css">
    <link rel="stylesheet" href="Estilos/Secciones/EstructuraBase.css">
</head>
<body>

    <div class="contenedor-principal">
        
        <!-- MENÚ LATERAL -->
        <aside class="menu-lateral p-3 shadow-lg">
            <div class="d-flex align-items-center mb-4 pb-3 border-bottom border-secondary">
                <i class="bi bi-hospital text-white fs-3 me-2"></i>
                <h5 class="mb-0 text-white fw-bold">Clínica<br><small class="fw-normal fs-6 text-white-50">Gestión Integral</small></h5>
            </div>

            <ul class="nav flex-column mb-auto">
                <!-- Por ahora solo ponemos el Panel Principal, luego agregaremos con JS según el rol -->
                <li class="nav-item">
                    <a href="#" class="nav-link active">
                        <i class="bi bi-grid me-2"></i> Panel Principal
                    </a>
                </li>
            </ul>

            <hr class="border-secondary">
            
            <div class="dropdown">
                <a href="#" class="d-flex align-items-center text-white text-decoration-none" id="btn-cerrar-sesion">
                    <i class="bi bi-box-arrow-left fs-4 me-2"></i>
                    <strong>Cerrar Sesión</strong>
                </a>
            </div>
        </aside>

        <!-- CONTENIDO PRINCIPAL -->
        <main class="contenido-derecho">
            
            <!-- ENCABEZADO SUPERIOR -->
            <header class="encabezado-superior">
                <div>
                    <!-- El título cambiará según en qué pantalla estemos luego -->
                    <h4 class="mb-0 fw-bold text-oscuro" id="titulo-pantalla">Panel Principal</h4>
                </div>
                <div class="d-flex align-items-center">
                    <div class="text-end me-3">
                        <!-- Aquí inyectamos el nombre de usuario y rol desde JS -->
                        <h6 class="mb-0 fw-bold text-oscuro" id="lbl-username">Cargando...</h6>
                        <small class="text-muted" id="lbl-rol">...</small>
                    </div>
                    <div class="bg-oscuro text-white rounded-circle d-flex align-items-center justify-content-center" style="width: 45px; height: 45px;">
                        <i class="bi bi-person-fill fs-5"></i>
                    </div>
                </div>
            </header>

            <!-- ESPACIO PARA INYECTAR LAS TARJETAS / VISTAS DINÁMICAS -->
            <div id="contenedor-dinamico">
                <div class="alert alert-info border-0 shadow-sm" role="alert">
                    <i class="bi bi-info-circle-fill me-2"></i> Bienvenido al sistema. Pronto aquí verás el módulo correspondiente a tu rol.
                </div>
            </div>

        </main>
    </div>

    <div class="modal fade" id="modalGestionarCama" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow" style="border-radius: 12px;">
                <div class="modal-header bg-light border-bottom-0" style="border-radius: 12px 12px 0 0;">
                    <h5 class="modal-title fw-bold text-oscuro"><i class="bi bi-gear-fill text-primary me-2"></i>Gestionar Cama</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="form-cambiar-estado">
                        <input type="hidden" id="modal-cama-id">
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-oscuro small">Estado Actual</label>
                            <input type="text" id="modal-estado-actual" class="form-control bg-light" readonly>
                        </div>

                        <div class="mb-3">
                            <label for="select-nuevo-estado" class="form-label fw-semibold text-oscuro small">Nuevo Estado</label>
                            <select class="form-select" id="select-nuevo-estado" required>
                                <option value="" selected disabled>Seleccione un estado...</option>
                                <option value="Disponible">Disponible</option>
                                <option value="Ocupada" disabled>Ocupada (Solo automático por internación)</option>
                                <option value="Limpieza">Limpieza</option>
                                <option value="Mantenimiento">Mantenimiento</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="input-motivo" class="form-label fw-semibold text-oscuro small">Motivo (Opcional)</label>
                            <textarea class="form-control" id="input-motivo" rows="2" placeholder="Ej: Cambio de sábanas completado..."></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primario px-4" id="btn-guardar-estado">Guardar Cambios</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- CDN de SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Script Controlador Principal -->
    <script type="module" src="JavaScript/Controladores/IndexControlador.js"></script>
</body>
</html>
