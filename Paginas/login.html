<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../Recursos/favicon.ico">
    <title>Login | MediCare - Internaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../Estilos/Paleta.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
                
                <div class="tarjeta-login p-4 p-md-5">
                    <div class="text-center mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="var(--color-primario)" class="bi bi-hospital mb-2" viewBox="0 0 16 16">
                            <path d="M8.5 5.034v1.1l.953-.55.5.867L9 7l.953.55-.5.866-.953-.55v1.1h-1v-1.1l-.953.55-.5-.866L7 7l-.953-.55.5-.866.953.55v-1.1h1ZM13.25 9a.25.25 0 0 0-.25.25v.5c0 .138.112.25.25.25h.5a.25.25 0 0 0 .25-.25v-.5a.25.25 0 0 0-.25-.25h-.5ZM13 11.25a.25.25 0 0 1 .25-.25h.5a.25.25 0 0 1 .25.25v.5a.25.25 0 0 1-.25.25h-.5a.25.25 0 0 1-.25-.25v-.5Zm-2.25-2.25a.25.25 0 0 0-.25.25v.5c0 .138.112.25.25.25h.5a.25.25 0 0 0 .25-.25v-.5a.25.25 0 0 0-.25-.25h-.5ZM11 11.25a.25.25 0 0 1 .25-.25h.5a.25.25 0 0 1 .25.25v.5a.25.25 0 0 1-.25.25h-.5a.25.25 0 0 1-.25-.25v-.5Z"/>
                            <path d="M2 1a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V1Zm11 0H3v14h3v-2.5a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 .5.5V15h3V1Z"/>
                        </svg>
                        <h4 class="text-oscuro fw-bold">MediCare</h4>
                        <p class="text-muted small">Sistema Central de Internaciones</p>
                    </div>

                    <form id="form-login">
                        <div id="alerta-error" class="alert alert-danger d-none py-2 text-center small" role="alert">
                            </div>

                        <div class="mb-3">
                            <label for="username" class="form-label text-oscuro fw-semibold small">Usuario</label>
                            <input type="text" class="form-control form-control-lg" id="username" placeholder="Ingrese su usuario" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="password" class="form-label text-oscuro fw-semibold small">Contraseña</label>
                            <input type="password" class="form-control form-control-lg" id="password" placeholder="••••••••" required>
                        </div>
                        
                        <button type="submit" id="btn-submit" class="btn btn-primario w-100 btn-lg fw-bold">
                            Iniciar Sesión
                        </button>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <script type="module" src="../JavaScript/Controladores/LoginControlador.js"></script>
</body>
</html>
